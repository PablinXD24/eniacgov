<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GovFlow | EniacGov</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --danger: #ef4444;
            --success: #10b981;
            --glass: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #e0e7ff; min-height: 100vh; display: flex; overflow: hidden; color: var(--text); }

        /* Liquid Background Blobs */
        .blob-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; filter: blur(60px); }
        .blob { position: absolute; width: 400px; height: 400px; background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 50%; opacity: 0.5; animation: move 20s infinite alternate; }
        .blob:nth-child(2) { background: #3b82f6; right: -50px; top: -50px; animation-duration: 25s; }
        @keyframes move { from { transform: translate(0, 0); } to { transform: translate(80px, 80px); } }

        /* Layout */
        .sidebar {
            width: 280px; height: 95vh; margin: 2.5vh 20px;
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 2rem; display: flex; flex-direction: column; z-index: 100;
        }
        .main-content {
            flex: 1; height: 95vh; margin: 2.5vh 20px 2.5vh 0;
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 2.5rem; overflow-y: auto;
        }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: rgba(255, 255, 255, 0.3); border: 1px solid var(--glass-border); border-radius: 18px; padding: 1.5rem; margin-bottom: 1.2rem; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3); }
        
        input, select, textarea { background: rgba(255, 255, 255, 0.6); border: 1px solid var(--glass-border); padding: 14px; border-radius: 12px; width: 100%; margin: 8px 0; outline: none; }

        .nav-link { padding: 12px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .nav-link.active { background: var(--primary); color: white; }

        .admin-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .admin-table th { text-align: left; padding: 12px; opacity: 0.7; font-size: 0.8rem; }
        .admin-table td { padding: 12px; border-top: 1px solid var(--glass-border); font-size: 0.9rem; }
        
        .badge { font-size: 0.65rem; padding: 4px 8px; border-radius: 8px; font-weight: 700; }
        .status-aberto { background: #fee2e2; color: #991b1b; }
        .status-resolvido { background: #dcfce7; color: #166534; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: fixed; bottom: 0; left: 0; margin: 0; border-radius: 24px 24px 0 0; padding: 10px; flex-direction: row; justify-content: space-around; }
            .sidebar h2 { display: none; }
            .main-content { margin: 10px; height: calc(100vh - 100px); padding: 1.5rem; }
            .nav-link p { display: none; }
        }
    </style>
</head>
<body>

    <div class="blob-container"><div class="blob"></div><div class="blob"></div></div>

    <aside class="sidebar">
        <h2 style="margin-bottom: 2rem; color: var(--primary);">EniacGov</h2>
        <div class="nav-link active" onclick="show('feed', this)"><span>📋</span><p>Mural</p></div>
        <div class="nav-link" onclick="show('new', this)"><span>✍️</span><p>Relatar</p></div>
        <div class="nav-link" onclick="show('dash', this)"><span>📊</span><p>Dashboard</p></div>
        <div id="adm-nav" class="nav-link" style="color: var(--danger); display: none;" onclick="show('admin', this)"><span>🛡️</span><p>Painel ADM</p></div>
    </aside>

    <main class="main-content">
        <section id="auth" class="section active">
            <div style="max-width: 400px; margin: 60px auto; text-align: center;">
                <h1>Bem-vindo</h1>
                <p style="opacity: 0.7; margin-bottom: 2rem;">Acesse o sistema para interagir com sua cidade.</p>
                <input type="email" id="loginEmail" placeholder="E-mail de acesso">
                <button class="btn" onclick="handleLogin()">Entrar</button>
            </div>
        </section>

        <section id="feed" class="section">
            <h2 style="margin-bottom: 1.5rem;">Problemas da Comunidade</h2>
            <div id="feedContent"></div>
        </section>

        <section id="new" class="section">
            <div class="card">
                <h2>Registrar Ocorrência</h2><br>
                <select id="categoria">
                    <option>Iluminação Pública</option>
                    <option>Saneamento Básico</option>
                    <option>Limpeza Urbana</option>
                    <option>Mobilidade Urbana</option>
                    <option>Saúde</option>
                </select>
                <textarea id="descricao" rows="5" placeholder="Descreva o problema detalhadamente..."></textarea>
                <button class="btn" onclick="createComplaint()">Publicar Denúncia</button>
            </div>
        </section>

        <section id="admin" class="section">
            <h2>Gestão Governamental</h2>
            <div class="card" style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Categoria</th>
                            <th>Status</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </section>

        <section id="dash" class="section">
            <h2>Estatísticas Gerais</h2>
            <div class="card">
                <canvas id="mainChart"></canvas>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Credenciais fornecidas [cite: 1, 2]
        const firebaseConfig = {
            apiKey: "AIzaSyBw9b8OKK9OdJ5vyCvV0HzoyQGgHumvuCk",
            authDomain: "eniacgov.firebaseapp.com",
            projectId: "eniacgov",
            storageBucket: "eniacgov.firebasestorage.app",
            messagingSenderId: "588502032266",
            appId: "1:588502032266:web:dbf67fc89d54806bd47273"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "pablo11ssous2@gmail.com";

        window.show = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
            if(id === 'feed') listenFeed();
            if(id === 'admin') listenAdmin();
            if(id === 'dash') renderChart();
        };

        window.handleLogin = () => {
            const email = document.getElementById('loginEmail').value;
            if(!email) return alert("Por favor, informe seu e-mail.");
            
            if(email === ADMIN_EMAIL) {
                document.getElementById('adm-nav').style.display = 'flex';
                alert("Acesso Administrativo Liberado.");
            }
            document.getElementById('auth').classList.remove('active');
            show('feed', document.querySelector('.nav-link'));
        };

        window.createComplaint = async () => {
            const cat = document.getElementById('categoria').value;
            const desc = document.getElementById('descricao').value;
            if(!desc) return alert("Descreva o problema.");

            try {
                await addDoc(collection(db, "denuncias"), {
                    categoria: cat,
                    descricao: desc,
                    status: "Aberto",
                    data: new Date().toISOString(),
                    likes: 0
                });
                alert("Denúncia enviada com sucesso!");
                show('feed');
            } catch(e) { console.error("Erro Firebase: ", e); }
        };

        window.resolveComplaint = async (id) => {
            try {
                await updateDoc(doc(db, "denuncias", id), { status: "Resolvido" });
            } catch(e) { console.error(e); }
        };

        function listenFeed() {
            const container = document.getElementById('feedContent');
            onSnapshot(collection(db, "denuncias"), (snap) => {
                container.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    container.innerHTML += `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between">
                                <b>${d.categoria}</b>
                                <span class="badge status-${d.status.toLowerCase()}">${d.status}</span>
                            </div>
                            <p style="margin: 10px 0;">${d.descricao}</p>
                            <small style="opacity:0.6">👍 ${d.likes} curtidas</small>
                        </div>`;
                });
            });
        }

        function listenAdmin() {
            const body = document.getElementById('adminTableBody');
            onSnapshot(collection(db, "denuncias"), (snap) => {
                body.innerHTML = "";
                snap.forEach(documento => {
                    const d = documento.data();
                    body.innerHTML += `
                        <tr>
                            <td>${d.categoria}</td>
                            <td><span class="badge status-${d.status.toLowerCase()}">${d.status}</span></td>
                            <td>
                                ${d.status === 'Aberto' ? `<button class="btn" style="padding:5px; font-size:0.7rem; background:var(--success)" onclick="resolveComplaint('${documento.id}')">Resolver</button>` : '---'}
                            </td>
                        </tr>`;
                });
            });
        }

        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Jan', 'Fev', 'Mar'],
                    datasets: [
                        { label: 'Abertas', data: [15, 22, 10], backgroundColor: '#6366f1' },
                        { label: 'Fechadas', data: [8, 12, 18], backgroundColor: '#10b981' }
                    ]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        }
    </script>
</body>
</html>
