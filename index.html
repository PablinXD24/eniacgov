<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GovFlow | Mural Comunitário</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #e0e7ff; min-height: 100vh; display: flex; overflow: hidden; color: var(--text); }

        /* Liquid Background */
        .blob-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; filter: blur(60px); }
        .blob { position: absolute; width: 400px; height: 400px; background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 50%; opacity: 0.5; animation: move 20s infinite alternate; }
        .blob:nth-child(2) { background: #3b82f6; right: -50px; top: -50px; animation-duration: 25s; }
        @keyframes move { from { transform: translate(0, 0); } to { transform: translate(80px, 80px); } }

        /* Layout */
        .sidebar {
            width: 280px; height: 95vh; margin: 2.5vh 20px;
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 2rem; display: flex; flex-direction: column; z-index: 100;
        }
        .main-content {
            flex: 1; height: 95vh; margin: 2.5vh 20px 2.5vh 0;
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 2.5rem; overflow-y: auto;
        }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: rgba(255, 255, 255, 0.3); border: 1px solid var(--glass-border); border-radius: 18px; padding: 1.5rem; margin-bottom: 1.2rem; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.3s; }
        
        input, select, textarea { background: rgba(255, 255, 255, 0.6); border: 1px solid var(--glass-border); padding: 14px; border-radius: 12px; width: 100%; margin: 8px 0; outline: none; }

        .nav-link { padding: 12px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .nav-link.active { background: var(--primary); color: white; }

        /* Animação de Sucesso */
        #success-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(99, 102, 241, 0.95); display: none;
            justify-content: center; align-items: center; z-index: 1000;
            flex-direction: column; color: white;
        }
        .badge { font-size: 0.7rem; padding: 4px 8px; border-radius: 8px; font-weight: 700; text-transform: uppercase; }
        .status-aberto { background: #fee2e2; color: #991b1b; }
        .status-resolvido { background: #dcfce7; color: #166534; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: fixed; bottom: 0; left: 0; margin: 0; border-radius: 24px 24px 0 0; padding: 10px; flex-direction: row; justify-content: space-around; }
            .sidebar h2 { display: none; }
            .main-content { margin: 10px; height: calc(100vh - 100px); padding: 1.5rem; }
            .nav-link p { display: none; }
        }
    </style>
</head>
<body>

    <div id="success-overlay">
        <h1 style="font-size: 4rem;">✅</h1>
        <h2>Denúncia Registrada!</h2>
        <p>Seu relato agora está no mural comunitário.</p>
    </div>

    <div class="blob-container"><div class="blob"></div><div class="blob"></div></div>

    <aside class="sidebar">
        <h2 style="margin-bottom: 2rem; color: var(--primary);">GovFlow</h2>
        <div class="nav-link active" onclick="show('feed', this)"><span>📋</span><p>Mural</p></div>
        <div class="nav-link" onclick="show('new', this)"><span>✍️</span><p>Relatar</p></div>
        <div class="nav-link" onclick="show('dash', this)"><span>📊</span><p>Dados</p></div>
        <div id="adm-nav" class="nav-link" style="color: var(--danger); display: none;" onclick="show('admin', this)"><span>🛡️</span><p>Painel ADM</p></div>
    </aside>

    <main class="main-content">
        <section id="auth" class="section active">
            <div style="max-width: 400px; margin: 60px auto; text-align: center;">
                <h1>Acesso</h1>
                <input type="email" id="userEmail" placeholder="Digite seu e-mail">
                <button class="btn" style="margin-top: 10px;" onclick="handleLogin()">Entrar no Sistema</button>
            </div>
        </section>

        <section id="feed" class="section">
            <h2 style="margin-bottom: 1.5rem;">Mural Comunitário</h2>
            <div id="feedList"></div>
        </section>

        <section id="new" class="section">
            <div class="card">
                <h2>Relatar Problema</h2>
                <select id="categoria">
                    <option>Iluminação Pública</option>
                    <option>Saneamento Básico</option>
                    <option>Limpeza Urbana</option>
                    <option>Mobilidade Urbana</option>
                </select>
                <textarea id="descricao" rows="5" placeholder="Descreva o problema para a comunidade..."></textarea>
                <button class="btn" onclick="sendComplaint()">Enviar Denúncia</button>
            </div>
        </section>

        <section id="admin" class="section">
            <h2>Gestão Governamental</h2>
            <div class="card" style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead><tr style="text-align: left; opacity: 0.6;"><th>Categoria</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody id="adminBody"></tbody>
                </table>
            </div>
        </section>

        <section id="dash" class="section">
            <h2>Métricas da Cidade</h2>
            <div class="card"><canvas id="mainChart"></canvas></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw9b8OKK9OdJ5vyCvV0HzoyQGgHumvuCk",
            authDomain: "eniacgov.firebaseapp.com",
            projectId: "eniacgov",
            storageBucket: "eniacgov.firebasestorage.app",
            messagingSenderId: "588502032266",
            appId: "1:588502032266:web:dbf67fc89d54806bd47273"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ADM_EMAIL = "pablo11ssousa2@gmail.com";

        window.show = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
            if(id === 'feed') listenFeed();
            if(id === 'admin') listenAdmin();
            if(id === 'dash') renderChart();
        };

        window.handleLogin = () => {
            const email = document.getElementById('userEmail').value.toLowerCase().trim();
            if(!email) return alert("Insira um e-mail");
            if(email === ADM_EMAIL) document.getElementById('adm-nav').style.display = 'flex';
            document.getElementById('auth').classList.remove('active');
            show('feed', document.querySelector('.nav-link'));
        };

        window.sendComplaint = async () => {
            const cat = document.getElementById('categoria').value;
            const desc = document.getElementById('descricao').value;
            if(!desc) return alert("Descreva o problema");

            try {
                await addDoc(collection(db, "denuncias"), {
                    categoria: cat, descricao: desc, status: "Aberto", data: new Date().toISOString()
                });
                
                // Animação de Sucesso
                const overlay = document.getElementById('success-overlay');
                overlay.style.display = 'flex';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    document.getElementById('descricao').value = "";
                    show('feed');
                }, 1800);
            } catch(e) { console.error(e); }
        };

        function listenFeed() {
            const container = document.getElementById('feedList');
            const q = query(collection(db, "denuncias"), orderBy("data", "desc"));
            onSnapshot(q, (snap) => {
                container.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    container.innerHTML += `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span class="badge status-${d.status.toLowerCase()}">${d.status}</span>
                                <b>${d.categoria}</b>
                            </div>
                            <p style="margin-top:10px;">${d.descricao}</p>
                        </div>`;
                });
            });
        }

        function listenAdmin() {
            const body = document.getElementById('adminBody');
            onSnapshot(collection(db, "denuncias"), (snap) => {
                body.innerHTML = "";
                snap.forEach(documento => {
                    const d = documento.data();
                    body.innerHTML += `
                        <tr style="border-top:1px solid var(--glass-border);">
                            <td style="padding:12px;">${d.categoria}</td>
                            <td style="padding:12px;"><span class="badge status-${d.status.toLowerCase()}">${d.status}</span></td>
                            <td style="padding:12px;">
                                ${d.status === 'Aberto' ? `<button class="btn" style="padding:5px; font-size:0.7rem; background:var(--success)" onclick="updateDoc(doc(db, 'denuncias', '${documento.id}'), {status: 'Resolvido'})">Resolver</button>` : '---'}
                            </td>
                        </tr>`;
                });
            });
        }

        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Jan', 'Fev', 'Mar'],
                    datasets: [{ label: 'Denúncias', data: [12, 19, 3], backgroundColor: '#6366f1' }]
                }
            });
        }
    </script>
</body>
</html>
